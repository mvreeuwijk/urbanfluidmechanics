name: Build & deploy to GitHub Pages

on:
  # deploy on every push to main
  push:
    branches: [main]
  # nightly rebuild so edits to the source Google Sheet appear within a day
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily
  # allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# allow one concurrent deployment; don't cancel an in-progress one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3   # installs deps, runs `astro build`, uploads the Pages artifact

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # url comes from whichever attempt succeeds
      url: ${{ steps.d1.outputs.page_url || steps.d2.outputs.page_url || steps.d3.outputs.page_url }}
    steps:
      # actions/deploy-pages occasionally flakes ("Deployment failed, try again later"),
      # so try up to three times with short backoffs before failing the job.
      - name: Deploy (attempt 1)
        id: d1
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Backoff before attempt 2
        if: steps.d1.outcome == 'failure'
        run: sleep 20
      - name: Deploy (attempt 2)
        id: d2
        if: steps.d1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Backoff before attempt 3
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        run: sleep 40
      - name: Deploy (attempt 3, final)
        id: d3
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        uses: actions/deploy-pages@v4
